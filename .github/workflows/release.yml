name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            output: ego-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            output: ego-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            output: ego-windows-amd64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: deno compile --target ${{ matrix.target }} --allow-all --output ${{ matrix.output }} src/index.ts

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release)') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install semantic-release
        run: |
          npm install --no-save semantic-release @semantic-release/github @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
